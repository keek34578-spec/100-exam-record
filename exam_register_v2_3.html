<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💯 百分卷登記系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Baloo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f5a623;
  --gold-light: #ffd166;
  --gold-pale: #fff8ec;
  --red: #e63946;
  --red-soft: #ff6b6b;
  --red-pale: #fff5f5;
  --teal: #2ec4b6;
  --bg: #faf8f5;
  --card: #ffffff;
  --text: #1e1e1e;
  --text-muted: #999;
  --border: #efe8dc;
  --shadow-sm: 0 2px 10px rgba(0,0,0,0.06);
  --shadow: 0 4px 24px rgba(0,0,0,0.09);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.13);
  --radius: 20px;
  --radius-sm: 12px;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  background-image:
    radial-gradient(ellipse at 15% 10%, rgba(255,209,102,0.22) 0%, transparent 45%),
    radial-gradient(ellipse at 88% 85%, rgba(230,57,70,0.07) 0%, transparent 40%);
}

/* ── LAYOUT ── */
.app-layout {
  display: flex;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.app-sidebar {
  width: 160px;
  flex-shrink: 0;
  position: sticky; top: 0;
  height: 100vh;
  background: rgba(250,248,245,0.97);
  backdrop-filter: blur(12px);
  border-right: 1.5px solid var(--border);
  display: flex; flex-direction: column;
  padding: 20px 12px 28px;
  z-index: 100;
}

.header-top {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding-bottom: 20px;
  border-bottom: 1.5px solid var(--border);
  margin-bottom: 16px;
  text-align: center;
}

.header-top .logo { font-size: 2.2rem; line-height:1; }

.header-top h1 {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1rem; font-weight: 900;
  letter-spacing: 0.02em;
  line-height: 1.3;
}
.header-top h1 span { color: var(--red); }

.nav-tabs {
  display: flex; flex-direction: column; gap: 6px;
  flex: 1;
}

.nav-tab {
  display: flex; align-items: center; gap: 9px;
  padding: 11px 14px;
  font-size: 0.92rem; font-weight: 700;
  color: var(--text-muted);
  cursor: pointer;
  border: none; background: none;
  font-family: 'Noto Sans TC', sans-serif;
  border-radius: var(--radius-sm);
  border-left: 3px solid transparent;
  transition: color 0.2s, background 0.2s, border-color 0.2s;
  text-align: left; width: 100%;
}
.nav-tab:hover { background: var(--gold-pale); color: var(--text); }
.nav-tab.active {
  color: var(--gold);
  background: var(--gold-pale);
  border-left-color: var(--gold);
}
.nav-tab .tab-icon { font-size: 1.15rem; flex-shrink: 0; }

/* ── MAIN CONTENT ── */
.app-main {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
}

/* ── PAGES ── */
.page { display: none; padding: 28px 32px 60px; max-width: 860px; margin: 0 auto; }
.page.active { display: block; }

/* ── COUNTER BANNER ── */
.counter-banner {
  background: linear-gradient(135deg, #c1121f 0%, var(--red) 60%, #f77f00 100%);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 20px;
  color: white;
  box-shadow: 0 6px 28px rgba(230,57,70,0.35);
  position: relative; overflow: hidden;
}
.counter-banner::after {
  content: '💯';
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  font-size: 4rem; opacity: 0.13;
}
.counter-label { font-size: 0.8rem; opacity: 0.82; font-weight: 600; margin-bottom: 4px; }
.counter-row { display: flex; align-items: baseline; gap: 8px; }
.counter-num {
  font-family: 'Baloo 2', sans-serif;
  font-size: 3rem; font-weight: 900; line-height: 1;
}
.counter-unit { font-size: 1.1rem; font-weight: 700; opacity: 0.85; }
.counter-sub { margin-top: 10px; display: flex; gap: 14px; }
.counter-pill {
  background: rgba(255,255,255,0.18);
  border-radius: 50px; padding: 4px 12px;
  font-size: 0.78rem; font-weight: 700;
}

/* ── FORM CARD ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 22px 20px;
  box-shadow: var(--shadow-sm);
  border: 1.5px solid var(--border);
  margin-bottom: 18px;
}

.card-title {
  font-size: 0.78rem; font-weight: 800;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 18px;
  display: flex; align-items: center; gap: 6px;
}

.form-group { margin-bottom: 18px; }

label.field-label {
  display: flex; align-items: center; gap: 7px;
  font-weight: 700; font-size: 0.9rem;
  color: var(--text); margin-bottom: 10px;
}

.step-badge {
  width: 22px; height: 22px;
  background: var(--gold);
  color: white;
  border-radius: 50%;
  font-size: 0.72rem; font-weight: 900;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

input[type="text"] {
  width: 100%; padding: 12px 15px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-family: 'Noto Sans TC', sans-serif;
  background: #fdfaf5; color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="text"]:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(245,166,35,0.15);
  background: white;
}

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip-input { display: none; }
.chip-label {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 8px 14px; border-radius: 50px;
  border: 2px solid var(--border);
  font-size: 0.88rem; font-weight: 700;
  cursor: pointer; background: #fdfaf5; color: var(--text-muted);
  transition: all 0.16s; user-select: none;
}
.chip-label:hover { border-color: var(--gold-light); color: var(--text); background: var(--gold-pale); }
.chip-input:checked + .chip-label {
  background: var(--gold); border-color: var(--gold);
  color: white; box-shadow: 0 3px 10px rgba(245,166,35,0.4);
  transform: translateY(-1px);
}
.cat-chips .chip-input:checked + .chip-label {
  background: var(--red-soft); border-color: var(--red-soft);
  box-shadow: 0 3px 10px rgba(255,107,107,0.4);
}
.point-chips .chip-input:checked + .chip-label.lbl-p1 {
  background: linear-gradient(135deg, #f5c542, var(--gold));
  border-color: var(--gold); color: #5a3a00;
  box-shadow: 0 3px 10px rgba(245,166,35,0.4);
}
.point-chips .chip-input:checked + .chip-label.lbl-p5 {
  background: linear-gradient(135deg, var(--red), #ff6b6b);
  border-color: var(--red); color: white;
  box-shadow: 0 3px 10px rgba(230,57,70,0.4);
}

/* Quantity input */
.qty-row { display: flex; align-items: center; gap: 0; border: 2px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; width: fit-content; background: #fdfaf5; }
.qty-btn {
  width: 44px; height: 44px;
  background: none; border: none;
  font-size: 1.4rem; font-weight: 700;
  cursor: pointer; color: var(--text-muted);
  transition: background 0.15s, color 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.qty-btn:hover { background: var(--gold-pale); color: var(--gold); }
.qty-num {
  width: 52px; text-align: center;
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.3rem; font-weight: 800;
  color: var(--text); border: none;
  background: none; outline: none;
}

/* Submit */
.btn-submit {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, var(--gold), #d4870d);
  color: white; border: none;
  border-radius: var(--radius-sm);
  font-size: 1.05rem; font-weight: 900;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer; letter-spacing: 0.04em;
  box-shadow: 0 5px 20px rgba(245,166,35,0.42);
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(245,166,35,0.52); }
.btn-submit:active { transform: translateY(0); }

/* ── CALENDAR PAGE ── */
.cal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.cal-month-label {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.2rem; font-weight: 900;
  color: var(--text);
}
.cal-nav {
  width: 36px; height: 36px;
  border-radius: 50%; border: 2px solid var(--border);
  background: white; cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.cal-nav:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-pale); }

.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px; margin-bottom: 20px;
}
.cal-dow {
  text-align: center; font-size: 0.72rem; font-weight: 800;
  color: var(--text-muted); padding: 4px 0 6px;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.cal-dow:first-child { color: var(--red-soft); }
.cal-dow:last-child { color: #5b9bd5; }

.cal-day {
  aspect-ratio: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-radius: 10px; cursor: pointer;
  font-size: 0.88rem; font-weight: 700;
  position: relative;
  transition: background 0.15s, transform 0.15s;
  border: 2px solid transparent;
}
.cal-day:hover:not(.empty) { background: var(--gold-pale); border-color: var(--gold-light); }
.cal-day.empty { cursor: default; }
.cal-day.today { background: var(--gold-pale); border-color: var(--gold); color: var(--gold); }
.cal-day.selected { background: var(--gold); border-color: var(--gold); color: white; transform: scale(1.05); box-shadow: 0 3px 12px rgba(245,166,35,0.4); }
.cal-day.has-record::after {
  content: '';
  position: absolute; bottom: 4px;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--red);
}
.cal-day.selected.has-record::after { background: white; }
.cal-day.other-month { opacity: 0.3; }

.day-records-header {
  font-weight: 800; font-size: 1rem;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}
.day-records-header .date-tag {
  font-size: 0.8rem; font-weight: 700;
  background: var(--gold); color: white;
  padding: 2px 10px; border-radius: 50px;
}

/* ── RECORD ITEMS ── */
.record-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 0;
  border-bottom: 1.5px solid var(--border);
  animation: slideIn 0.3s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes slideIn {
  from { opacity:0; transform: translateX(-12px); }
  to { opacity:1; transform: translateX(0); }
}
.record-item:last-child { border-bottom: none; }

.rec-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 900; color: #5a3a00;
  flex-shrink: 0;
}
.rec-info { flex: 1; min-width: 0; }
.rec-name { font-weight: 800; font-size: 0.95rem; }
.rec-tags { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
.tag {
  padding: 2px 8px; border-radius: 50px;
  font-size: 0.7rem; font-weight: 700;
}
.tag-subj { background: #fff3cd; color: #856404; }
.tag-type { background: #fde8e8; color: #c1121f; }
.rec-time { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
.rec-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.rec-pts {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.3rem; font-weight: 900;
}
.rec-pts.p1 { color: var(--gold); }
.rec-pts.p5 { color: var(--red); }
.rec-qty { font-size: 0.72rem; color: var(--text-muted); font-weight: 700; }

.rec-actions { display: flex; gap: 6px; }
.btn-edit, .btn-del {
  width: 30px; height: 30px;
  border-radius: 8px; border: none;
  cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.btn-edit { background: var(--gold-pale); color: var(--gold); }
.btn-edit:hover { background: var(--gold); color: white; }
.btn-del { background: var(--red-pale); color: var(--red-soft); }
.btn-del:hover { background: var(--red-soft); color: white; }

/* Empty state */
.empty-state {
  text-align: center; padding: 36px 0;
  color: var(--text-muted); font-size: 0.9rem;
}
.empty-icon { font-size: 2.8rem; margin-bottom: 8px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.45);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: white; width: 100%; max-width: 520px;
  border-radius: 28px 28px 0 0;
  padding: 24px 20px 36px;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(.34,1.2,.64,1);
  max-height: 90vh; overflow-y: auto;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle {
  width: 40px; height: 4px;
  background: var(--border); border-radius: 2px;
  margin: 0 auto 18px;
}
.modal-title {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.2rem; font-weight: 900;
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}
.btn-modal-save {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--teal), #1a9e94);
  color: white; border: none;
  border-radius: var(--radius-sm);
  font-size: 1rem; font-weight: 900;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer; margin-top: 6px;
  box-shadow: 0 4px 16px rgba(46,196,182,0.4);
  transition: transform 0.15s;
}
.btn-modal-save:hover { transform: translateY(-2px); }
.btn-modal-cancel {
  width: 100%; padding: 12px;
  background: none; border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.95rem; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer; margin-top: 10px;
  color: var(--text-muted);
  transition: all 0.15s;
}
.btn-modal-cancel:hover { border-color: var(--text-muted); color: var(--text); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1e1e1e; color: white;
  padding: 13px 26px; border-radius: 50px;
  font-weight: 700; font-size: 0.93rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.35s;
  opacity: 0; z-index: 999; white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* Error shake */
.shake { animation: shake 0.4s; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* animation */
@keyframes popIn {
  from { opacity:0; transform: scale(0.9) translateY(-12px); }
  to { opacity:1; transform: scale(1) translateY(0); }
}
.pop { animation: popIn 0.4s cubic-bezier(.34,1.56,.64,1) both; }

.page-title {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.4rem; font-weight: 900;
  margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
}

/* Stats bottom cards side by side */
.stats-cards-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
.stat-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 14px;
  text-align: center;
}
.stat-num {
  font-family: 'Baloo 2', sans-serif;
  font-size: 2rem; font-weight: 900;
  color: var(--gold);
}
.stat-label { font-size: 0.78rem; color: var(--text-muted); font-weight: 700; margin-top: 2px; }

/* Register page layout */
#page-register {
  display: none;
  max-width: 600px;
  margin: 0 auto;
}
#page-register.active {
  display: block;
}

/* Calendar page 2-col layout */
#page-calendar {
  display: none;
}
#page-calendar.active {
  display: block;
}
.cal-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: start;
}

.divider { height: 1px; background: var(--border); margin: 6px 0 16px; }
</style>
</head>
<body>

<div class="app-layout">

<!-- SIDEBAR -->
<div class="app-sidebar">
  <div class="header-top">
    <div class="logo">💯</div>
    <h1>百分卷<span>登記系統</span></h1>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('register')">
      <span class="tab-icon">✏️</span>登記
    </button>
    <button class="nav-tab" onclick="switchPage('calendar')">
      <span class="tab-icon">📅</span>日曆
    </button>
    <button class="nav-tab" onclick="switchPage('history')">
      <span class="tab-icon">📋</span>紀錄
    </button>
    <button class="nav-tab" onclick="switchPage('stats')">
      <span class="tab-icon">📊</span>統計
    </button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="app-main">

<!-- ══════════ PAGE: REGISTER ══════════ -->
<div class="page active" id="page-register">

  <!-- Counter -->
  <div class="counter-banner pop" style="animation-delay:0.05s">
    <div class="counter-label">📦 櫃台累計發出</div>
    <div class="counter-row">
      <span class="counter-num" id="totalAmt">0</span>
      <span class="counter-unit">元</span>
    </div>
    <div class="counter-sub">
      <span class="counter-pill" id="pill1">🪙 1元：0張</span>
      <span class="counter-pill" id="pill5">💰 5元：0張</span>
      <span class="counter-pill" id="pillTotal">共 0 筆</span>
    </div>
  </div>

  <!-- Form -->
  <div class="card pop" style="animation-delay:0.1s">
    <div class="card-title">✏️ 新增登記</div>

    <!-- 姓名 -->
    <div class="form-group">
      <label class="field-label"><span class="step-badge">1</span>姓名</label>
      <input type="text" id="nameInput" placeholder="請輸入學生姓名" autocomplete="off">
    </div>

    <!-- 科目 -->
    <div class="form-group">
      <label class="field-label"><span class="step-badge">2</span>科目</label>
      <div class="chips" id="subChips">
        <input type="radio" name="sub" id="s_kw" value="國文" class="chip-input">
        <label for="s_kw" class="chip-label">📖 國文</label>
        <input type="radio" name="sub" id="s_sx" value="數學" class="chip-input">
        <label for="s_sx" class="chip-label">🔢 數學</label>
        <input type="radio" name="sub" id="s_yw" value="英文" class="chip-input">
        <label for="s_yw" class="chip-label">🔤 英文</label>
        <input type="radio" name="sub" id="s_zr" value="自然" class="chip-input">
        <label for="s_zr" class="chip-label">🔬 自然</label>
        <input type="radio" name="sub" id="s_sh" value="社會" class="chip-input">
        <label for="s_sh" class="chip-label">🌍 社會</label>
        <input type="radio" name="sub" id="s_sh2" value="生活" class="chip-input">
        <label for="s_sh2" class="chip-label">🌈 生活</label>
      </div>
    </div>

    <!-- 類別 -->
    <div class="form-group">
      <label class="field-label"><span class="step-badge">3</span>類別</label>
      <div class="chips cat-chips" id="typeChips">
        <input type="radio" name="typ" id="t_xk" value="小考" class="chip-input">
        <label for="t_xk" class="chip-label">📝 小考</label>
        <input type="radio" name="typ" id="t_tz" value="聽寫" class="chip-input">
        <label for="t_tz" class="chip-label">👂 聽寫</label>
        <input type="radio" name="typ" id="t_dk" value="段考" class="chip-input">
        <label for="t_dk" class="chip-label">📋 段考</label>
      </div>
    </div>

    <!-- 點數 -->
    <div class="form-group">
      <label class="field-label"><span class="step-badge">4</span>獎勵點數</label>
      <div class="chips point-chips" id="ptChips">
        <input type="radio" name="pts" id="p_1" value="1" class="chip-input">
        <label for="p_1" class="chip-label lbl-p1">🪙 1 元</label>
        <input type="radio" name="pts" id="p_5" value="5" class="chip-input">
        <label for="p_5" class="chip-label lbl-p5">💰 5 元</label>
      </div>
    </div>

    <!-- 張數 -->
    <div class="form-group">
      <label class="field-label"><span class="step-badge">5</span>張數</label>
      <div class="qty-row" id="qtyRow">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <input class="qty-num" type="number" id="qtyInput" value="1" min="1" max="99" readonly>
        <button class="qty-btn" onclick="changeQty(1)">＋</button>
      </div>
    </div>

    <button class="btn-submit" onclick="submitForm()">🎉 登記百分卷！</button>
  </div>
</div>

<!-- ══════════ PAGE: CALENDAR ══════════ -->
<div class="page" id="page-calendar">
  <div class="page-title pop">📅 日曆查詢</div>
  <div class="cal-layout">
  <div class="card pop">
    <div class="cal-header">
      <button class="cal-nav" onclick="calPrev()">‹</button>
      <div class="cal-month-label" id="calLabel"></div>
      <button class="cal-nav" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
  <div class="card pop" id="dayRecordsCard">
    <div class="day-records-header">
      <span>當日紀錄</span>
      <span class="date-tag" id="selectedDateTag">今天</span>
    </div>
    <div id="dayRecordList"><div class="empty-state"><div class="empty-icon">📭</div><div>請選擇日期</div></div></div>
  </div>
  </div>
</div>

<!-- ══════════ PAGE: HISTORY ══════════ -->
<div class="page" id="page-history">
  <div class="page-title pop">📋 所有紀錄</div>

  <!-- Search -->
  <div class="card pop" style="animation-delay:0.05s">
    <input type="text" id="searchInput" placeholder="🔍 搜尋姓名、科目、類別…" oninput="renderHistory()" autocomplete="off">
  </div>

  <div class="card pop" style="animation-delay:0.1s">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="card-title" style="margin:0">所有紀錄</div>
      <button class="btn-edit" style="width:auto;padding:0 12px;border-radius:50px;font-size:0.8rem;font-weight:800;height:32px;background:var(--red-pale);color:var(--red-soft);" onclick="clearAll()">🗑 清除全部</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<!-- ══════════ PAGE: STATS ══════════ -->
<div class="page" id="page-stats">
  <div class="page-title pop">📊 統計總覽</div>
  <div class="stats-grid pop" id="statsGrid"></div>
  <div class="stats-cards-row">
  <div class="card pop" style="animation-delay:0.1s">
    <div class="card-title">🏆 各科目登記次數</div>
    <div id="subjectStats"></div>
  </div>
  <div class="card pop" style="animation-delay:0.15s">
    <div class="card-title">👤 學生登記排行</div>
    <div id="studentStats"></div>
  </div>
  </div>
</div>

<!-- ══════════ EDIT MODAL ══════════ -->
<div class="modal-overlay" id="editModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ 修改紀錄</div>

    <div class="form-group">
      <label class="field-label"><span class="step-badge">1</span>姓名</label>
      <input type="text" id="editName" placeholder="學生姓名">
    </div>
    <div class="form-group">
      <label class="field-label"><span class="step-badge">2</span>科目</label>
      <div class="chips" id="editSubChips">
        <input type="radio" name="esub" id="es_kw" value="國文" class="chip-input"><label for="es_kw" class="chip-label">📖 國文</label>
        <input type="radio" name="esub" id="es_sx" value="數學" class="chip-input"><label for="es_sx" class="chip-label">🔢 數學</label>
        <input type="radio" name="esub" id="es_yw" value="英文" class="chip-input"><label for="es_yw" class="chip-label">🔤 英文</label>
        <input type="radio" name="esub" id="es_zr" value="自然" class="chip-input"><label for="es_zr" class="chip-label">🔬 自然</label>
        <input type="radio" name="esub" id="es_sh" value="社會" class="chip-input"><label for="es_sh" class="chip-label">🌍 社會</label>
        <input type="radio" name="esub" id="es_sh2" value="生活" class="chip-input"><label for="es_sh2" class="chip-label">🌈 生活</label>
      </div>
    </div>
    <div class="form-group">
      <label class="field-label"><span class="step-badge">3</span>類別</label>
      <div class="chips cat-chips">
        <input type="radio" name="etyp" id="et_xk" value="小考" class="chip-input"><label for="et_xk" class="chip-label">📝 小考</label>
        <input type="radio" name="etyp" id="et_tz" value="聽寫" class="chip-input"><label for="et_tz" class="chip-label">👂 聽寫</label>
        <input type="radio" name="etyp" id="et_dk" value="段考" class="chip-input"><label for="et_dk" class="chip-label">📋 段考</label>
      </div>
    </div>
    <div class="form-group">
      <label class="field-label"><span class="step-badge">4</span>獎勵點數</label>
      <div class="chips point-chips">
        <input type="radio" name="epts" id="ep_1" value="1" class="chip-input"><label for="ep_1" class="chip-label lbl-p1">🪙 1 元</label>
        <input type="radio" name="epts" id="ep_5" value="5" class="chip-input"><label for="ep_5" class="chip-label lbl-p5">💰 5 元</label>
      </div>
    </div>
    <div class="form-group">
      <label class="field-label"><span class="step-badge">5</span>張數</label>
      <div class="qty-row">
        <button class="qty-btn" onclick="changeEditQty(-1)">−</button>
        <input class="qty-num" type="number" id="editQty" value="1" min="1" max="99" readonly>
        <button class="qty-btn" onclick="changeEditQty(1)">＋</button>
      </div>
    </div>

    <button class="btn-modal-save" onclick="saveEdit()">💾 儲存修改</button>
    <button class="btn-modal-cancel" onclick="closeModal()">取消</button>
  </div>
</div>

</div><!-- end app-main -->
</div><!-- end app-layout -->

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
let records = JSON.parse(localStorage.getItem('exam100_v2') || '[]');
let editingId = null;
let calYear, calMonth, selectedDate;

const today = new Date();
calYear = today.getFullYear();
calMonth = today.getMonth();
selectedDate = toDateStr(today);

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function save() { localStorage.setItem('exam100_v2', JSON.stringify(records)); }

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── NAV ──
function switchPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  event.currentTarget.classList.add('active');
  if (id === 'calendar') renderCalendar();
  if (id === 'history') renderHistory();
  if (id === 'stats') renderStats();
}

// ── QTY ──
function changeQty(d) {
  const el = document.getElementById('qtyInput');
  el.value = Math.max(1, Math.min(99, parseInt(el.value) + d));
}
function changeEditQty(d) {
  const el = document.getElementById('editQty');
  el.value = Math.max(1, Math.min(99, parseInt(el.value) + d));
}

// ── GET RADIO ──
function getRadio(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : null;
}
function setRadio(name, val) {
  const el = document.querySelector(`input[name="${name}"][value="${val}"]`);
  if (el) el.checked = true;
}

// ── SUBMIT ──
function submitForm() {
  const name = document.getElementById('nameInput').value.trim();
  const sub = getRadio('sub');
  const typ = getRadio('typ');
  const pts = getRadio('pts');
  const qty = parseInt(document.getElementById('qtyInput').value);

  if (!name) { shake('nameInput'); showToast('⚠️ 請輸入姓名！'); return; }
  if (!sub)  { shake('subChips');  showToast('⚠️ 請選擇科目！'); return; }
  if (!typ)  { shake('typeChips'); showToast('⚠️ 請選擇類別！'); return; }
  if (!pts)  { shake('ptChips');   showToast('⚠️ 請選擇點數！'); return; }

  const now = new Date();
  records.unshift({
    id: Date.now(),
    name, subject: sub, type: typ,
    points: parseInt(pts), qty,
    date: toDateStr(now),
    time: now.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})
  });
  save();

  document.getElementById('nameInput').value = '';
  document.getElementById('qtyInput').value = 1;
  document.querySelectorAll('input[name="sub"],input[name="typ"],input[name="pts"]')
    .forEach(r => r.checked = false);

  updateCounter();
  showToast(`🎊 恭喜 ${name} 登記 ${qty} 張成功！`);
}

function shake(id) {
  const el = document.getElementById(id);
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 500);
}

// ── COUNTER ──
function updateCounter() {
  const totalAmt = records.reduce((s,r) => s + r.points * r.qty, 0);
  const cnt1 = records.filter(r=>r.points===1).reduce((s,r)=>s+r.qty,0);
  const cnt5 = records.filter(r=>r.points===5).reduce((s,r)=>s+r.qty,0);
  document.getElementById('totalAmt').textContent = totalAmt;
  document.getElementById('pill1').textContent = `🪙 1元：${cnt1}張`;
  document.getElementById('pill5').textContent = `💰 5元：${cnt5}張`;
  document.getElementById('pillTotal').textContent = `共 ${records.length} 筆`;
}

// ── RECORD RENDER ──
function renderRecordItem(r, showDate=false) {
  const totalPts = r.points * r.qty;
  return `
    <div class="record-item" id="item-${r.id}">
      <div class="rec-avatar">${r.name.charAt(0)}</div>
      <div class="rec-info">
        <div class="rec-name">${r.name}</div>
        <div class="rec-tags">
          <span class="tag tag-subj">${r.subject}</span>
          <span class="tag tag-type">${r.type}</span>
        </div>
        <div class="rec-time">${showDate ? r.date + ' ' : ''}${r.time}　共 ${r.qty} 張</div>
      </div>
      <div class="rec-right">
        <div class="rec-pts ${r.points===5?'p5':'p1'}">+${totalPts}元</div>
        <div class="rec-qty">${r.points}元 × ${r.qty}</div>
        <div class="rec-actions">
          <button class="btn-edit" onclick="openEdit(${r.id})">✏️</button>
          <button class="btn-del" onclick="deleteRecord(${r.id})">🗑</button>
        </div>
      </div>
    </div>`;
}

// ── HISTORY PAGE ──
function renderHistory() {
  const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  const filtered = q
    ? records.filter(r => r.name.includes(q) || r.subject.includes(q) || r.type.includes(q))
    : records;
  const list = document.getElementById('historyList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div>${q?'查無相關紀錄':'還沒有任何紀錄'}</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(r => renderRecordItem(r, true)).join('');
}

// ── CALENDAR ──
const MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const DOWS = ['日','一','二','三','四','五','六'];

function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

function renderCalendar() {
  document.getElementById('calLabel').textContent = `${calYear} 年 ${MONTHS[calMonth]}`;

  const dateCounts = {};
  records.forEach(r => { dateCounts[r.date] = (dateCounts[r.date]||0) + 1; });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const todayStr = toDateStr(today);

  let html = DOWS.map(d => `<div class="cal-dow">${d}</div>`).join('');

  for(let i=0;i<firstDay;i++) html += `<div class="cal-day empty"></div>`;

  for(let d=1;d<=daysInMonth;d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const classes = ['cal-day',
      ds===todayStr?'today':'',
      ds===selectedDate?'selected':'',
      dateCounts[ds]?'has-record':''
    ].filter(Boolean).join(' ');
    html += `<div class="${classes}" onclick="selectDate('${ds}')">${d}</div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
  renderDayRecords();
}

function selectDate(ds) {
  selectedDate = ds;
  renderCalendar();
}

function renderDayRecords() {
  const tag = document.getElementById('selectedDateTag');
  const ds = selectedDate;
  const parts = ds.split('-');
  tag.textContent = `${parseInt(parts[1])}/${parseInt(parts[2])}`;

  const dayRecs = records.filter(r => r.date === ds);
  const list = document.getElementById('dayRecordList');

  if (!dayRecs.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div>這天沒有登記紀錄</div></div>`;
    return;
  }
  list.innerHTML = dayRecs.map(r => renderRecordItem(r)).join('');
}

// ── STATS ──
function renderStats() {
  const total = records.reduce((s,r)=>s+r.points*r.qty,0);
  const cnt1 = records.filter(r=>r.points===1).reduce((s,r)=>s+r.qty,0);
  const cnt5 = records.filter(r=>r.points===5).reduce((s,r)=>s+r.qty,0);
  const totalQty = records.reduce((s,r)=>s+r.qty,0);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">累計發出（元）</div></div>
    <div class="stat-card"><div class="stat-num">${totalQty}</div><div class="stat-label">總張數</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--gold)">${cnt1}</div><div class="stat-label">1元券張數</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${cnt5}</div><div class="stat-label">5元券張數</div></div>
  `;

  // Subject stats
  const subMap = {};
  records.forEach(r => { subMap[r.subject] = (subMap[r.subject]||0) + r.qty; });
  const subSorted = Object.entries(subMap).sort((a,b)=>b[1]-a[1]);
  const maxSub = subSorted[0]?.[1] || 1;
  document.getElementById('subjectStats').innerHTML = subSorted.map(([sub,cnt]) => `
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:0.85rem;font-weight:700;margin-bottom:4px">
        <span>${sub}</span><span style="color:var(--gold)">${cnt} 張</span>
      </div>
      <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${cnt/maxSub*100}%;background:linear-gradient(90deg,var(--gold-light),var(--gold));border-radius:4px;transition:width 0.4s"></div>
      </div>
    </div>`).join('') || '<div class="empty-state" style="padding:20px 0"><div>尚無資料</div></div>';

  // Student stats
  const stuMap = {};
  records.forEach(r => {
    if (!stuMap[r.name]) stuMap[r.name] = { qty: 0, pts: 0 };
    stuMap[r.name].qty += r.qty;
    stuMap[r.name].pts += r.points * r.qty;
  });
  const stuSorted = Object.entries(stuMap).sort((a,b)=>b[1].qty-a[1].qty).slice(0,10);
  document.getElementById('studentStats').innerHTML = stuSorted.map(([name,data],i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1.5px solid var(--border)">
      <div style="width:24px;height:24px;border-radius:50%;background:${i<3?'var(--gold)':'var(--border)'};color:${i<3?'white':'var(--text-muted)'};display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:900;flex-shrink:0">${i+1}</div>
      <div style="font-weight:700;font-size:0.9rem;flex:1">${name}</div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <div style="display:flex;align-items:baseline;gap:2px">
          <span style="font-family:'Baloo 2',sans-serif;font-size:1.05rem;font-weight:900;color:var(--gold)">${data.qty}</span>
          <span style="font-size:0.72rem;color:var(--text-muted);font-weight:600">張</span>
        </div>
        <div style="width:1px;height:14px;background:var(--border)"></div>
        <div style="display:flex;align-items:baseline;gap:2px">
          <span style="font-family:'Baloo 2',sans-serif;font-size:1.05rem;font-weight:900;color:var(--red)">${data.pts}</span>
          <span style="font-size:0.72rem;color:var(--text-muted);font-weight:600">元</span>
        </div>
      </div>
    </div>`).join('') || '<div class="empty-state" style="padding:20px 0"><div>尚無資料</div></div>';
}

// ── EDIT ──
function openEdit(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('editName').value = r.name;
  document.getElementById('editQty').value = r.qty;
  setRadio('esub', r.subject);
  setRadio('etyp', r.type);
  setRadio('epts', String(r.points));
  document.getElementById('editModal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('editModal')) {
    document.getElementById('editModal').classList.remove('open');
    editingId = null;
  }
}

function saveEdit() {
  const name = document.getElementById('editName').value.trim();
  const sub = getRadio('esub');
  const typ = getRadio('etyp');
  const pts = getRadio('epts');
  const qty = parseInt(document.getElementById('editQty').value);

  if (!name||!sub||!typ||!pts) { showToast('⚠️ 請填寫所有欄位！'); return; }

  const idx = records.findIndex(x => x.id === editingId);
  if (idx === -1) return;
  records[idx] = { ...records[idx], name, subject:sub, type:typ, points:parseInt(pts), qty };
  save(); updateCounter();
  closeModal();
  renderHistory();
  renderDayRecords();
  showToast('✅ 修改成功！');
}

// ── DELETE ──
function deleteRecord(id) {
  if (!confirm('確定要刪除這筆紀錄嗎？')) return;
  records = records.filter(r => r.id !== id);
  save(); updateCounter();
  renderHistory();
  renderCalendar();
  renderStats();
  showToast('🗑 已刪除');
}

function clearAll() {
  if (!records.length) return;
  if (!confirm('確定要清除所有紀錄嗎？')) return;
  records = []; save(); updateCounter(); renderHistory();
  showToast('🗑 已清除所有紀錄');
}

// ── INIT ──
updateCounter();
renderCalendar();
renderHistory();
</script>
</body>
</html>
